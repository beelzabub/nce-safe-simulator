image: python:latest

stages:
  - build
  - pages

test:
  stage: build
  script:
    - pip install -r requirements.txt
    - python -m pytest tests/

pages:
  stage: pages
  script:
    - pip install -r requirements.txt
    - python3 NceGitLab.py --report all --formats markdown --no-ssl-verify
  only:
    - develop
