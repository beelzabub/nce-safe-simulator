image: python:latest

stages:
  - build
  - report
  - pages

python-version-test:
  stage: build
  script:
    - pip install -r requirements.txt
    - python -m pytest tests/

generate-reports:
  stage: report
  script:
    - pip install -r requirements.txt
    - python NceGitLab.py --report all
    - zip -r reports.zip reports/
  artifacts:
    name: "reports-${CI_COMMIT_SHORT_SHA}"
    paths:
      - reports.zip
    expire_in: 30 days
  variables:
    ACCESS_TOKEN: $ACCESS_TOKEN
    GROUP_NAME: $GROUP_NAME
  when: manual

pages:
  stage: pages
  image: ghcr.io/quarto-dev/quarto:latest
  before_script:
    - pip install -r requirements.txt
  script:
    # Generate all report data
    - python NceGitLab.py --report all
    # Copy data to public/ so WASM notebooks can fetch it at runtime
    - mkdir -p public/data
    - cp data/*.json public/data/
    # Export Marimo WASM notebooks (CDN-hosted Pyodide — see issue #47 for self-hosting investigation)
    - mkdir -p public/interactive
    - marimo export html-wasm marimo/health-dashboard.py -o public/interactive/health-dashboard/ -f
    # Render static Quarto pages (fallback)
    - quarto render
  artifacts:
    paths:
      - public/
    expire_in: 7 days
  variables:
    ACCESS_TOKEN: $ACCESS_TOKEN
    GROUP_NAME: $GROUP_NAME
  when: manual
