image: python:latest

stages:
  - build
  - pages

test:
  stage: build
  script:
    - pip install -r requirements.txt
    - python -m pytest tests/

pages:
  stage: pages
  image: ghcr.io/quarto-dev/quarto:latest
  before_script:
    - apt-get update -qq && apt-get install -y python3-pip -qq
    - pip3 install -r requirements.txt
  script:
    - python3 NceGitLab.py --report all --formats markdown
  artifacts:
    paths:
      - public/
    expire_in: 7 days
  only:
    - develop
