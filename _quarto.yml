execute:
  execute-dir: project

format:
  html:
    theme:
      - cosmo
      - quarto/assets/theme-peo-c4i.scss
    toc: true
    toc-depth: 2
    number-sections: false
    embed-resources: false
    grid:
      sidebar-width: 0px
      body-width: 1200px
