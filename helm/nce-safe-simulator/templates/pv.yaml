{{- $fsId := .Values.efs.fileSystemId -}}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nce-config
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: nce-config
    namespace: {{ .Release.Namespace }}
  csi:
    driver: efs.csi.aws.com
    volumeHandle: "{{ $fsId }}::{{ .Values.efs.accessPoints.config }}"
    volumeAttributes:
      encryptInTransit: "false"
