<style>
/* ── PEO C4I nav bar ─────────────────────────────── */
#pc4i-nav, #pc4i-nav * { box-sizing: border-box; margin: 0; padding: 0; }
#pc4i-nav {
  position: fixed; top: 0; left: 0; width: 100%; height: 48px;
  background: #0a2447; border-bottom: 3px solid #c8a951;
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
  z-index: 10000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 13px; color: #dce6f5;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
#pc4i-nav img.pc4i-logo { height: 30px; flex-shrink: 0; }
#pc4i-nav .pc4i-brand {
  font-weight: 600; color: #dce6f5; white-space: nowrap;
  margin-right: 6px; text-decoration: none;
}
#pc4i-nav .pc4i-menus { display: flex; align-items: stretch; flex: 1; }
.pc4i-menu { position: relative; display: flex; align-items: stretch; }
.pc4i-menu-trigger {
  display: flex; align-items: center; gap: 4px;
  padding: 0 12px; cursor: default;
  color: #b8ccdf; font-size: 13px; font-weight: 500;
  white-space: nowrap; user-select: none;
  transition: color 0.15s;
}
.pc4i-menu-trigger::after { content: " \25be"; font-size: 10px; opacity: .7; }
.pc4i-menu:hover .pc4i-menu-trigger { color: #c8a951; }
.pc4i-dropdown {
  display: none; position: absolute; top: 100%; left: 0;
  min-width: 230px; background: #0f2e5a;
  border: 1px solid #c8a951; border-radius: 4px;
  z-index: 10001; box-shadow: 0 6px 16px rgba(0,0,0,.5);
}
.pc4i-menu:hover .pc4i-dropdown { display: block; }
.pc4i-dropdown a {
  display: block; padding: 8px 16px;
  color: #b8ccdf; text-decoration: none; font-size: 0.88rem; white-space: nowrap;
}
.pc4i-dropdown a:hover { background: #1a3a6b; color: #c8a951; }
#pc4i-toggle {
  margin-left: auto; flex-shrink: 0;
  background: rgba(200,169,81,.12); border: 1px solid #c8a951;
  color: #c8a951; padding: 5px 14px; border-radius: 4px;
  text-decoration: none; font-size: 12px; font-weight: 600; white-space: nowrap;
}
#pc4i-toggle:hover { background: rgba(200,169,81,.28); }
</style>
<script>
(function () {
  var NAV = [
    { label: 'Executive', items: [
      ['Portfolio Health',         '/quarto/health-dashboard.html'],
      ['Risk Register',            '/quarto/risk-register.html'],
      ['WSJF Priority Board',      '/quarto/wsjf.html'],
      ['SAFe Portfolio Hierarchy', '/quarto/portfolio.html'],
    ]},
    { label: 'Program', items: [
      ['Blocking & Cross-ART Risk',   '/quarto/blocking.html'],
      ['Epic Lifecycle',              '/quarto/epic-lifecycle.html'],
      ['PI Predictability',           '/quarto/pi-predictability.html'],
      ['ART Capacity Balance',        '/quarto/art-capacity-balance.html'],
      ['Program × PI Matrix',    '/quarto/piid-project.html'],
      ['Program PI Detail',           '/quarto/piid-project-detail.html'],
      ['ART-Team Workload',           '/quarto/workload.html'],
      ['Flow Metrics',                '/quarto/flow-metrics.html'],
      ['ART Feature Status',          '/quarto/art-feature-status.html'],
      ['Team Backlogs',               '/quarto/team-backlog.html'],
      ['VS Capability Dashboard',     '/quarto/vs-capability-dashboard.html'],
    ]},
    { label: 'Data Quality', items: [
      ['Unassigned PI',      '/quarto/unassigned-pi.html'],
      ['Orphaned Epics',     '/quarto/orphan-epics.html'],
      ['Orphaned Issues',    '/quarto/orphan-issues.html'],
      ['Premature Closures', '/quarto/premature-closures.html'],
    ]},
  ];

  var HAS_INTERACTIVE = [
    'health-dashboard','pi-predictability','flow-metrics',
    'art-capacity-balance','piid-project','piid-project-detail',
    'workload','art-feature-status','vs-capability-dashboard',
    'team-backlog','portfolio',
  ];

  document.addEventListener('DOMContentLoaded', function () {
    var m = window.location.pathname.match(/\/interactive\/([^\/]+)/);
    var slug = m ? m[1] : null;
    var staticHref = (slug && HAS_INTERACTIVE.indexOf(slug) >= 0)
      ? '/quarto/' + slug + '.html' : null;

    var nav = document.createElement('nav');
    nav.id = 'pc4i-nav';

    var h = '<a href="/"><img class="pc4i-logo" src="/quarto/assets/peo-c4i-seal.png" alt="PEO C4I"></a>'
          + '<a class="pc4i-brand" href="/">PEO C4I Portfolio Reports</a>'
          + '<div class="pc4i-menus">';

    NAV.forEach(function (g) {
      h += '<div class="pc4i-menu">'
         +   '<span class="pc4i-menu-trigger">' + g.label + '</span>'
         +   '<div class="pc4i-dropdown">';
      g.items.forEach(function (it) {
        h += '<a href="' + it[1] + '">' + it[0] + '</a>';
      });
      h += '</div></div>';
    });
    h += '</div>';

    if (staticHref) {
      h += '<a id="pc4i-toggle" href="' + staticHref + '">📄 Static</a>';
    }

    nav.innerHTML = h;
    document.body.insertBefore(nav, document.body.firstChild);
  });
})();
</script>
