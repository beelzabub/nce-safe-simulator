<style>
  #peo-c4i-nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    height: 44px;
    background: #0a2447;
    border-bottom: 3px solid #c8a951;
    color: #dce6f5;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    z-index: 10000;
    box-shadow: 0 2px 6px rgba(0,0,0,.35);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    box-sizing: border-box;
  }
  #peo-c4i-nav img.nav-seal { height: 28px; flex-shrink: 0; }
  #peo-c4i-nav .nav-title { font-weight: 600; color: #dce6f5; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #peo-c4i-nav a.nav-home { color: #c8a951; text-decoration: none; font-size: 12px; font-weight: 600; white-space: nowrap; }
  #peo-c4i-nav a.nav-home:hover { text-decoration: underline; }
</style>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var nav = document.createElement('div');
    nav.id = 'peo-c4i-nav';
    nav.innerHTML =
      '<img class="nav-seal" src="/quarto/assets/peo-c4i-seal.png" alt="PEO C4I">' +
      '<span class="nav-title">PEO C4I Portfolio Reports</span>' +
      '<a class="nav-home" href="/">&#8592; Reports</a>';
    document.body.insertBefore(nav, document.body.firstChild);
  });
</script>
